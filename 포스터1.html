<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #eef2f3; margin: 0; padding: 20px; color: #333; }
        .poster { width: 900px; margin: auto; background: white; padding: 40px; border-top: 10px solid #2c3e50; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .section-box { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        h2 { background: #3498db; color: white; padding: 8px; border-radius: 4px; font-size: 18px; margin-top: 0; }
        .grid-flex { display: flex; gap: 20px; align-items: flex-start; }
        .img-container { width: 100%; text-align: center; }
        img { max-width: 100%; height: auto; border: 1px solid #eee; margin-top: 10px; }
        .footer { text-align: center; font-size: 22px; font-weight: bold; margin-top: 20px; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="poster">
        <h1>댓글 데이터 기반 악성 댓글 멀티 라벨 분류</h1>

        <div class="section-box">
            <h2>1. 연구 배경 및 데이터 분석(EDA)</h2>
            <div class="grid-flex">
                <ul style="flex: 1;">
                    <li><b>배경:</b> 온라인 유해 댓글 자동 필터링 필요</li>
                    <li><b>데이터:</b> Kaggle Toxic Comment Dataset</li>
                    <li><b>분포 분석:</b> 클래스 불균형 존재 확인</li>
                </ul>
                <div class="img-container" style="flex: 1;">
                    <img src="data_dist_plot.png" alt="데이터분포">
                </div>
            </div>
        </div>

        <div class="section-box">
            <h2>2. 전처리 및 모델 설계</h2>
            <ul>
                <li>데이터 정제(결측치 제거) 및 토큰 제한(128)</li>
                <li>분석 대상 35,000건 중 28,000건 학습</li>
            </ul>
        </div>

        <div class="section-box">
            <h2>3. 모델 성능 결과</h2>
            <div class="grid-flex">
                <div class="img-container"><img src="accuracy_plot.png" alt="정확도"></div>
                <div class="img-container"><img src="loss_plot.png" alt="손실함수"></div>
            </div>
        </div>

        <div class="footer">
            최종 정확도: 98.34% 달성 | MobileBERT 경량 모델 적용
        </div>
    </div>
</body>
</html>
